apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'

buildscript {
    dependencies {
        classpath "com.android.tools.build:gradle:$androidPluginVersion"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

//apply plugin: 'com.android.library'
//apply plugin: 'kotlin-android'

android {
    namespace 'com.strato.hidrive.scanbot'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        viewBinding true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            consumerProguardFiles 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        abortOnError false
    }
}

dependencies {
    implementation project(':commonUI')
    implementation project(":domain")

    api "io.scanbot:sdk-package-2:$scanbot_sdk_version"
    implementation 'com.google.android.material:material:1.11.0'

    compileOnly kotlin_stdlib_jdk7
    compileOnly reactivex_rxjava2
    compileOnly reactivex_rxandroid2

    implementation "androidx.activity:activity-ktx:1.7.2"
    implementation "androidx.recyclerview:recyclerview:1.3.1"

    implementation "com.google.dagger:dagger:$daggerVersion"
    kapt "com.google.dagger:dagger-compiler:$daggerVersion"

//    testImplementation rootProject.ext.reactivex_rxjava2
//    testImplementation rootProject.ext.reactivex_rxandroid2
//    testImplementation "androidx.arch.core:core-testing:$arch_core"
//    testImplementation "androidx.lifecycle:lifecycle-runtime-testing:$lifecycle_version"
//    testImplementation "androidx.lifecycle:lifecycle-reactivestreams-ktx:$lifecycle_version"
//    testImplementation "com.viseven.develop:reduxCore:$redux_core_version"
//    testImplementation rootProject.ext.junit
//    testImplementation rootProject.ext.mockito_kotlin
}
