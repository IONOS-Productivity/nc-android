apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'

buildscript {
    dependencies {
        classpath "com.android.tools.build:gradle:$androidPluginVersion"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

android {
    namespace 'com.ionos.scanbot'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34

        // todo by mahera loicense here
        buildConfigField "String", "SCANBOT_LICENSE_KEY", "\"\""
        buildConfigField "String", "SCANBOT_LICENSE_KEY_URL", "\"https://static.hidrive.com/scanbot/HidriveAndroidScanbotLicense.txt\""
        buildConfigField "Boolean", "IS_SCANBOT_FEATURE_AVAILABLE", "true"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    buildTypes {
        release {
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            consumerProguardFiles 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        abortOnError false
    }
}

dependencies {
    implementation project(':commonUI')
    implementation project(":domain")

    api "io.scanbot:sdk-package-2:$scanbot_sdk_version"
    implementation 'com.google.android.material:material:1.11.0'

    compileOnly reactivex_rxjava2
    compileOnly reactivex_rxandroid2
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "androidx.activity:activity-ktx:1.7.2"
    implementation "androidx.recyclerview:recyclerview:1.3.1"
    implementation "androidx.preference:preference:$preference_version"
    

    implementation "com.google.dagger:dagger:$daggerVersion"
    kapt "com.google.dagger:dagger-compiler:$daggerVersion"
}
